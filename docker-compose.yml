services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: barbertime-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: barbertime
      RABBITMQ_DEFAULT_PASS: barbertime
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
